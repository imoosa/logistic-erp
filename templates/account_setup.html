<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo-bgless.png') }}">
  <title>Complete Your Account · Magnustic ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0F766E 0%, #134E4A 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
    h2 { font-size: 24px; font-weight: 700; color: #111827; margin-bottom: 6px; }
    .subtitle { color: #6B7280; font-size: 13px; margin-bottom: 24px; line-height: 1.5; }
    .subtitle strong { color: #111827; }
    .section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; margin: 20px 0 10px; }
    .section-label:first-of-type { margin-top: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #E5E7EB; border-radius: 10px; font-size: 14px; font-family: 'Poppins', sans-serif; }
    input:focus { outline: none; border-color: #0D9488; box-shadow: 0 0 0 3px rgba(13,148,136,0.15); }
    #otpInput { font-size: 20px; letter-spacing: 6px; text-align: center; }
    .btn-submit { width: 100%; padding: 12px; background: #F59E0B; color: #1F2937; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
    .btn-submit:hover { background: #D97706; color: #fff; }
    .flash-message { background: #FEE2E2; color: #DC2626; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; }
    .flash-success { background: #F0FDF4; color: #15803D; padding: 12px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 20px; }
    .resend { text-align: center; margin-top: 16px; font-size: 13px; color: #6B7280; }
    .resend a { color: #0D9488; text-decoration: none; font-weight: 600; }
    .resend a:hover { text-decoration: underline; }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 42px; }
    .toggle-password {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; padding: 4px;
      display: flex; align-items: center; justify-content: center; color: #9CA3AF;
    }
    .toggle-password:hover { color: #0D9488; }
    .toggle-password svg { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Complete your account</h2>
    <p class="subtitle">Enter the code sent to <strong>{{ email }}</strong> and choose your password.</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="{{ 'flash-success' if category == 'success' else 'flash-message' }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="section-label">Verification Code</div>
      <div class="form-group">
        <input id="otpInput" type="text" name="otp" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" required autofocus>
      </div>

      <div class="section-label">New Password</div>
      <div class="form-group">
        <label>Password</label>
        <div class="password-wrap">
          <input type="password" name="password" id="newPassword" minlength="8" required>
          <button type="button" class="toggle-password" data-target="newPassword" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrap">
          <input type="password" name="confirm_password" id="confirmPassword" minlength="8" required>
          <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Show password">
            <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit">Complete Setup →</button>
    </form>

    <div class="resend">
      Didn't get the code? <a href="{{ url_for('resend_account_setup_otp') }}">Resend</a>
    </div>
  </div>

  <script>
    document.querySelectorAll('.toggle-password').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var input = document.getElementById(btn.getAttribute('data-target'));
        var showing = input.type === 'text';
        input.type = showing ? 'password' : 'text';
        btn.querySelector('.icon-eye').style.display = showing ? 'block' : 'none';
        btn.querySelector('.icon-eye-off').style.display = showing ? 'none' : 'block';
        btn.setAttribute('aria-label', showing ? 'Show password' : 'Hide password');
      });
    });
  </script>
</body>
</html>
